<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match the Following – Robotics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --bg: #f1f5f9;
            --panel: rgba(255,255,255,0.88);
            --accent: #0284c7;
            --accent-cyan: #0891b2;
            --green: #16a34a;
            --red: #dc2626;
            --text: #0f172a;
            --dim: #64748b;
            --border: rgba(15,23,42,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 20;
        }

        #header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        #header .meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .score-badge {
            background: linear-gradient(135deg, #0284c7, #0891b2);
            color: #fff;
            font-weight: 800;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .reset-btn {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text);
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ─── INSTRUCTION BAR ─── */
        #instruction-bar {
            text-align: center;
            padding: 10px;
            font-size: 0.78rem;
            color: var(--dim);
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.6);
            border-bottom: 1px solid var(--border);
        }

        #instruction-bar.success {
            background: linear-gradient(135deg, rgba(22,163,74,0.1), rgba(34,211,238,0.1));
            color: var(--green);
        }

        /* ─── MAIN AREA ─── */
        #game-area {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* LEFT: 3D models column */
        #models-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px 16px 16px 24px;
            align-items: flex-end;
        }

        .model-card {
            width: 160px;
            height: 100px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            transition: all 0.25s;
            overflow: hidden;
            flex-shrink: 0;
        }

        .model-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(2,132,199,0.15);
            transform: scale(1.03);
        }

        .model-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(2,132,199,0.2);
        }

        .model-card.matched {
            border-color: var(--green);
            opacity: 0.7;
            pointer-events: none;
        }

        .model-card canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* CENTER: SVG lines */
        #lines-svg {
            width: 120px;
            min-width: 120px;
            height: 100%;
        }

        /* RIGHT: labels column */
        #labels-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px 24px 16px 16px;
            align-items: flex-start;
        }

        .label-card {
            width: 160px;
            height: 100px;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.82rem;
            text-align: center;
            padding: 12px;
            transition: all 0.25s;
            flex-shrink: 0;
            line-height: 1.3;
        }

        .label-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 4px 20px rgba(8,145,178,0.15);
            transform: scale(1.03);
        }

        .label-card.selected {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(8,145,178,0.2);
        }

        .label-card.matched {
            border-color: var(--green);
            color: var(--green);
            opacity: 0.7;
            pointer-events: none;
        }

        .label-card.wrong {
            animation: wrongShake 0.4s;
            border-color: var(--red);
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* ─── FULLSCREEN BUTTON ─── */
        #fs-btn {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            z-index: 30;
            transition: all 0.2s;
        }
        #fs-btn:hover { background: #fff; transform: scale(1.08); }

        /* ─── COMPLETED OVERLAY ─── */
        #complete-overlay {
            position: fixed;
            inset: 0;
            background: rgba(241,245,249,0.92);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 16px;
        }

        #complete-overlay.show { display: flex; }

        #complete-overlay h2 {
            font-size: 2rem;
            font-weight: 900;
            color: var(--green);
        }

        #complete-overlay p {
            color: var(--dim);
            font-size: 0.9rem;
        }

        #complete-overlay button {
            margin-top: 8px;
            padding: 10px 28px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div id="header">
        <h1>🤖 Match the Following – Robotics</h1>
        <div class="meta">
            <span class="score-badge">Score: <span id="score">0</span> / <span id="total">7</span></span>
            <button class="reset-btn" onclick="resetGame()">↻ Reset</button>
        </div>
    </div>

    <!-- INSTRUCTION -->
    <div id="instruction-bar">Click a 3D model on the left, then click the correct name on the right to match them.</div>

    <!-- GAME AREA -->
    <div id="game-area">
        <div id="models-column"></div>
        <svg id="lines-svg"></svg>
        <div id="labels-column"></div>
    </div>

    <!-- COMPLETED OVERLAY -->
    <div id="complete-overlay">
        <h2>🎉 All Matched!</h2>
        <p>You correctly identified all robot types and components.</p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <!-- FULLSCREEN BUTTON -->
    <button id="fs-btn" title="Toggle Fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
        </svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    // ═══════════════════════════════════════════════
    //  DATA: 7 matching pairs
    // ═══════════════════════════════════════════════
    const PAIRS = [
        { id: 'industrial',  label: 'Industrial Robot' },
        { id: 'scara',       label: 'SCARA Robot' },
        { id: 'mobile',      label: 'Mobile Robot' },
        { id: 'delta',       label: 'Delta Robot' },
        { id: 'base',        label: 'Robot Base' },
        { id: 'joint',       label: 'Robot Joint' },
        { id: 'gripper',     label: 'End Effector' }
    ];

    let score = 0;
    let selectedModel = null;
    let selectedLabel = null;
    let matchedPairs = new Set();
    let modelElements = {};
    let labelElements = {};

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playCorrect() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(523, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1047, audioCtx.currentTime + 0.15);
        g.gain.setValueAtTime(0.12, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.35);
    }

    function playWrong() {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(150, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.3);
    }

    // ═══════════════════════════════════════════════
    //  3D MODEL BUILDERS
    // ═══════════════════════════════════════════════
    const MAT = {
        orange: new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.35, metalness: 0.4 }),
        dark:   new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.5, metalness: 0.8 }),
        silver: new THREE.MeshStandardMaterial({ color: 0xcbd5e1, roughness: 0.4, metalness: 0.6 }),
        cyan:   new THREE.MeshStandardMaterial({ color: 0x22d3ee, emissive: 0x22d3ee, emissiveIntensity: 0.6 }),
        green:  new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.4, metalness: 0.3 }),
        blue:   new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.3, metalness: 0.5 }),
        red:    new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.3, metalness: 0.4 }),
        wheel:  new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.6, metalness: 0.3 }),
    };

    function createIndustrialRobot(scene) {
        const g = new THREE.Group();
        // Base
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.8, 0.3, 24), MAT.dark);
        base.position.y = 0.15; g.add(base);
        // Column
        const col = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.55, 1.2, 20), MAT.orange);
        col.position.y = 0.9; g.add(col);
        // Shoulder
        const sh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), MAT.orange);
        sh.position.y = 1.6; g.add(sh);
        // Lower arm
        const la = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 1.8, 12), MAT.orange);
        la.position.set(0, 2.4, 0); la.rotation.z = -0.2; g.add(la);
        // Elbow
        const el = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), MAT.dark);
        el.position.set(0.36, 3.15, 0); g.add(el);
        // Upper arm
        const ua = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.16, 1.2, 12), MAT.orange);
        ua.position.set(0.9, 3.0, 0); ua.rotation.z = 1.3; g.add(ua);
        // Gripper
        const gb = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.3), MAT.dark);
        gb.position.set(1.5, 2.5, 0); g.add(gb);

        g.position.y = -1.6;
        scene.add(g);
    }

    function createSCARA(scene) {
        const g = new THREE.Group();
        // pedestal
        const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.7, 0.35, 24), MAT.dark);
        base.position.y = 0.175; g.add(base);
        // vertical column
        const col = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.32, 2.0, 16), MAT.silver);
        col.position.y = 1.35; g.add(col);
        // 1st arm
        const a1 = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.2, 0.4), MAT.blue);
        a1.position.set(0.7, 2.4, 0); g.add(a1);
        // joint
        const j1 = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.3, 16), MAT.dark);
        j1.position.set(1.5, 2.4, 0); g.add(j1);
        // 2nd arm
        const a2 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 0.35), MAT.blue);
        a2.position.set(2.3, 2.4, 0); g.add(a2);
        // vertical shaft
        const vs = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.0, 8), MAT.dark);
        vs.position.set(2.9, 1.9, 0); g.add(vs);

        g.position.set(-0.8, -1.4, 0);
        scene.add(g);
    }

    function createMobileRobot(scene) {
        const g = new THREE.Group();
        // body
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 1.2), MAT.green);
        body.position.y = 0.7; g.add(body);
        // top sensor
        const top = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.4), MAT.dark);
        top.position.y = 1.2; g.add(top);
        const lens = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), MAT.cyan);
        lens.position.set(0, 1.2, 0.25); g.add(lens);
        // wheels
        for (let i = -1; i <= 1; i += 2) {
            for (let j = -1; j <= 1; j += 2) {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16), MAT.wheel);
                w.rotation.z = Math.PI / 2;
                w.position.set(i * 0.7, 0.25, j * 0.7);
                g.add(w);
            }
        }
        g.position.y = -0.8;
        scene.add(g);
    }

    function createDeltaRobot(scene) {
        const g = new THREE.Group();
        // top plate
        const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 0.15, 3), MAT.dark);
        plate.position.y = 2.5; plate.rotation.y = Math.PI / 6; g.add(plate);
        // 3 arms
        for (let i = 0; i < 3; i++) {
            const ang = (i / 3) * Math.PI * 2 + Math.PI / 6;
            const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2.2, 8), MAT.red);
            arm.position.set(Math.cos(ang) * 0.35, 1.4, Math.sin(ang) * 0.35);
            arm.rotation.x = Math.sin(ang) * 0.25;
            arm.rotation.z = -Math.cos(ang) * 0.25;
            g.add(arm);
            // lower arm pair
            const la1 = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 1.4, 6), MAT.silver);
            la1.position.set(Math.cos(ang) * 0.5, 0.5, Math.sin(ang) * 0.5 - 0.1);
            la1.rotation.x = Math.sin(ang) * 0.15;
            g.add(la1);
            const la2 = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 1.4, 6), MAT.silver);
            la2.position.set(Math.cos(ang) * 0.5, 0.5, Math.sin(ang) * 0.5 + 0.1);
            la2.rotation.x = Math.sin(ang) * 0.15;
            g.add(la2);
        }
        // bottom effector
        const bp = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.1, 3), MAT.dark);
        bp.rotation.y = Math.PI / 6; g.add(bp);

        g.position.y = -1.2;
        scene.add(g);
    }

    function createBase(scene) {
        const g = new THREE.Group();
        const main = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1.1, 0.5, 32), MAT.dark);
        main.position.y = 0.25; g.add(main);
        const ring = new THREE.Mesh(new THREE.TorusGeometry(1.0, 0.06, 8, 32), MAT.cyan);
        ring.rotation.x = Math.PI / 2; ring.position.y = 0.5; g.add(ring);
        const top = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.75, 0.3, 24), MAT.orange);
        top.position.y = 0.65; g.add(top);
        // bolts
        for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.12, 6), MAT.silver);
            bolt.position.set(Math.cos(a) * 0.95, 0.5, Math.sin(a) * 0.95);
            g.add(bolt);
        }
        g.position.y = -0.5;
        scene.add(g);
    }

    function createJoint(scene) {
        const g = new THREE.Group();
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.65, 24, 24), MAT.orange);
        sphere.position.y = 0.8; g.add(sphere);
        const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.05, 8, 32), MAT.dark);
        ring1.position.y = 0.8; ring1.rotation.x = Math.PI / 2; g.add(ring1);
        const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.7, 0.05, 8, 32), MAT.dark);
        ring2.position.y = 0.8; g.add(ring2);
        // axle
        const axle = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.6, 8), MAT.silver);
        axle.position.y = 0.8; axle.rotation.z = Math.PI / 2; g.add(axle);

        g.position.y = -0.6;
        scene.add(g);
    }

    function createGripper(scene) {
        const g = new THREE.Group();
        // base plate
        const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.15, 16), MAT.dark);
        plate.position.y = 1.0; g.add(plate);
        // body
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 0.6), MAT.silver);
        body.position.y = 0.7; g.add(body);
        // jaw left
        const jl = new THREE.Group();
        jl.position.set(-0.3, 0.35, 0);
        const jlb = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.25), MAT.dark);
        jl.add(jlb);
        const jlt = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.25), MAT.dark);
        jlt.position.set(-0.1, -0.2, 0); jl.add(jlt);
        g.add(jl);
        // jaw right
        const jr = jl.clone();
        jr.position.x = 0.3;
        jr.children[1].position.x = 0.1;
        g.add(jr);
        // neon tips
        const t1 = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.5, 0.08), MAT.cyan);
        t1.position.set(-0.3, 0.35, 0.15); g.add(t1);
        const t2 = t1.clone(); t2.position.x = 0.3; g.add(t2);

        g.position.y = -0.7;
        scene.add(g);
    }

    const MODEL_BUILDERS = {
        industrial: createIndustrialRobot,
        scara: createSCARA,
        mobile: createMobileRobot,
        delta: createDeltaRobot,
        base: createBase,
        joint: createJoint,
        gripper: createGripper,
    };

    // ═══════════════════════════════════════════════
    //  CREATE MINI THREE.JS SCENES
    // ═══════════════════════════════════════════════
    function createMiniScene(container, buildFn) {
        const w = container.clientWidth || 160;
        const h = container.clientHeight || 100;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf1f5f9);

        const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 100);
        camera.position.set(3, 2.5, 3.5);
        camera.lookAt(0, 0.8, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dir = new THREE.DirectionalLight(0xffffff, 0.9);
        dir.position.set(5, 8, 4);
        scene.add(dir);

        // Floor grid
        const grid = new THREE.GridHelper(8, 8, 0xcbd5e1, 0xe2e8f0);
        scene.add(grid);

        buildFn(scene);

        // Slow auto-rotate
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.008;
            camera.position.x = Math.cos(angle) * 4;
            camera.position.z = Math.sin(angle) * 4;
            camera.lookAt(0, 0.8, 0);
            renderer.render(scene, camera);
        }
        animate();
    }

    // ═══════════════════════════════════════════════
    //  CREATE LABELS
    // ═══════════════════════════════════════════════
    function createLabels() {
        const col = document.getElementById('labels-column');
        col.innerHTML = '';
        // Shuffle labels
        const shuffled = [...PAIRS].sort(() => Math.random() - 0.5);
        shuffled.forEach(p => {
            const card = document.createElement('div');
            card.className = 'label-card';
            card.dataset.id = p.id;
            card.innerText = p.label;
            card.addEventListener('click', () => handleLabelClick(p.id, card));
            col.appendChild(card);
            labelElements[p.id] = card;
        });
    }

    // ═══════════════════════════════════════════════
    //  CREATE ROBOT MODELS
    // ═══════════════════════════════════════════════
    function createRobotModels() {
        const col = document.getElementById('models-column');
        col.innerHTML = '';
        // Shuffle models
        const shuffled = [...PAIRS].sort(() => Math.random() - 0.5);
        shuffled.forEach(p => {
            const card = document.createElement('div');
            card.className = 'model-card';
            card.dataset.id = p.id;
            card.addEventListener('click', () => handleModelClick(p.id, card));
            col.appendChild(card);
            modelElements[p.id] = card;

            // Create mini 3D scene inside card
            requestAnimationFrame(() => {
                createMiniScene(card, MODEL_BUILDERS[p.id]);
            });
        });
    }

    // ═══════════════════════════════════════════════
    //  SELECTION & MATCHING LOGIC
    // ═══════════════════════════════════════════════
    function handleModelClick(id, el) {
        if (matchedPairs.has(id)) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        // Deselect previous
        document.querySelectorAll('.model-card.selected').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedModel = id;

        if (selectedLabel) checkMatch();
    }

    function handleLabelClick(id, el) {
        if (matchedPairs.has(id)) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        document.querySelectorAll('.label-card.selected').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        selectedLabel = id;

        if (selectedModel) checkMatch();
    }

    function checkMatch() {
        if (!selectedModel || !selectedLabel) return;

        const mEl = modelElements[selectedModel];
        const lEl = labelElements[selectedLabel];

        if (selectedModel === selectedLabel) {
            // CORRECT
            playCorrect();
            matchedPairs.add(selectedModel);
            mEl.classList.add('matched');
            mEl.classList.remove('selected');
            lEl.classList.add('matched');
            lEl.classList.remove('selected');
            drawConnectionLine(mEl, lEl, true);
            score++;
            document.getElementById('score').innerText = score;

            if (score === PAIRS.length) {
                document.getElementById('instruction-bar').innerText = '🎉 Congratulations! All matches correct!';
                document.getElementById('instruction-bar').classList.add('success');
                setTimeout(() => {
                    document.getElementById('complete-overlay').classList.add('show');
                }, 600);
            }
        } else {
            // WRONG
            playWrong();
            lEl.classList.add('wrong');
            drawConnectionLine(mEl, lEl, false);
            setTimeout(() => {
                lEl.classList.remove('wrong', 'selected');
            }, 500);
        }

        selectedModel = null;
        selectedLabel = null;
    }

    // ═══════════════════════════════════════════════
    //  DRAW CONNECTION LINE
    // ═══════════════════════════════════════════════
    function drawConnectionLine(modelEl, labelEl, correct) {
        const svg = document.getElementById('lines-svg');
        const svgRect = svg.getBoundingClientRect();

        const mRect = modelEl.getBoundingClientRect();
        const lRect = labelEl.getBoundingClientRect();

        const x1 = mRect.right - svgRect.left;
        const y1 = mRect.top + mRect.height / 2 - svgRect.top;
        const x2 = lRect.left - svgRect.left;
        const y2 = lRect.top + lRect.height / 2 - svgRect.top;

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', correct ? '#16a34a' : '#dc2626');
        line.setAttribute('stroke-width', correct ? '3' : '2');
        line.setAttribute('stroke-linecap', 'round');
        if (correct) {
            line.setAttribute('stroke-dasharray', '0');
        } else {
            line.setAttribute('stroke-dasharray', '6,4');
        }
        line.style.opacity = '0';
        line.style.transition = 'opacity 0.3s';
        svg.appendChild(line);

        requestAnimationFrame(() => { line.style.opacity = '1'; });

        if (!correct) {
            setTimeout(() => {
                line.style.opacity = '0';
                setTimeout(() => line.remove(), 300);
            }, 600);
        }
    }

    // ═══════════════════════════════════════════════
    //  RESET
    // ═══════════════════════════════════════════════
    function resetGame() {
        score = 0;
        selectedModel = null;
        selectedLabel = null;
        matchedPairs.clear();
        modelElements = {};
        labelElements = {};
        document.getElementById('score').innerText = '0';
        document.getElementById('lines-svg').innerHTML = '';
        document.getElementById('instruction-bar').innerText = 'Click a 3D model on the left, then click the correct name on the right to match them.';
        document.getElementById('instruction-bar').classList.remove('success');
        document.getElementById('complete-overlay').classList.remove('show');
        createRobotModels();
        createLabels();
    }

    // ═══════════════════════════════════════════════
    //  FULLSCREEN
    // ═══════════════════════════════════════════════
    document.getElementById('fs-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    });

    // ═══════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════
    createRobotModels();
    createLabels();
    </script>
</body>
</html>
